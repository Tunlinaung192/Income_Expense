<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ဝင်ငွေ/ထွက်ငွေ စာရင်း</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <div id="login-section" style="background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px;">
            <h3 style="margin-top:0; color: #34495e;">📱 ဖုန်းနံပါတ်ဖြင့် အကောင့်ဝင်ရန်</h3>
            <input type="tel" id="user-phone" placeholder="ဖုန်းနံပါတ် ရိုက်ထည့်ပါ (ဥပမာ- 09123456)" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; text-align: center;">
            
            <label style="font-weight: bold; font-size: 13px; color: #34495e; display:block; margin-bottom: 4px;">အသုံးပြုမည့် အကောင့်ရွေးချယ်ပါ-</label>
            <select id="user-acc-type" style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; font-weight: bold; text-align: center;">
                <option value="Acc1">👤 Account 1</option>
                <option value="Acc2">👥 Account 2</option>
            </select>
            <button onclick="loginUser()" style="background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-size: 14px; font-weight: bold; width: 100%; cursor: pointer;">🔐 အကောင့်အတည်ပြုမည်</button>
        </div>

        <div id="main-app" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: #eaedf1; padding: 8px; border-radius: 5px;">
                <span id="active-user-display" style="font-size: 12px; font-weight: bold; color: #2c3e50;"></span>
                <button onclick="logoutUser()" style="background: #e74c3c; color: white; border: none; padding: 3px 8px; font-size: 11px; border-radius: 3px; cursor: pointer;">ထွက်မည် 🏃</button>
            </div>

            <div class="balance-board" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                <div class="card income" style="grid-column: span 1; background: #2ecc71; color: white; padding: 10px; border-radius: 8px; text-align: center;">
                    <h3 style="margin:0; font-size: 14px;">ဝင်ငွေစုစုပေါင်း</h3>
                    <p id="total-income" style="margin: 5px 0 0 0; font-weight: bold;">0</p>
                </div>
                <div class="card expense" style="grid-column: span 1; background: #e74c3c; color: white; padding: 10px; border-radius: 8px; text-align: center;">
                    <h3 style="margin:0; font-size: 14px;">ထွက်ငွေစုစုပေါင်း</h3>
                    <p id="total-expense" style="margin: 5px 0 0 0; font-weight: bold;">0</p>
                </div>
                <div class="card banking-bal" style="background: #9b59b6; color: white; padding: 10px; border-radius: 8px; text-align: center;">
                    <h3 style="margin:0; font-size: 14px;">🏦 Banking လက်ကျန်</h3>
                    <p id="banking-balance" style="margin: 5px 0 0 0; font-weight: bold;">0</p>
                </div>
                <div class="card cash-bal" style="background: #e67e22; color: white; padding: 10px; border-radius: 8px; text-align: center;">
                    <h3 style="margin:0; font-size: 14px;">💵 Cash လက်ကျန်</h3>
                    <p id="cash-balance" style="margin: 5px 0 0 0; font-weight: bold;">0</p>
                </div>
                <div class="card balance" style="grid-column: span 2; background: #34495e; color: white; padding: 10px; border-radius: 8px; text-align: center;">
                    <h3 style="margin:0; font-size: 14px;">💰 စုစုပေါင်း လက်ကျန်ငွေ</h3>
                    <p id="net-balance" style="margin: 5px 0 0 0; font-weight: bold; font-size: 18px;">0</p>
                </div>
            </div>
            <div class="form-container">
                <select id="method" onchange="toggleBankNameInput()" style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; font-weight: bold;">
                    <option value="Banking">🏦 Banking (Kpay / Wave / Bank)</option>
                    <option value="Cash">💵 Cash (လက်ကျန်ငွေသား)</option>
                </select>

                <select id="bank-select" onchange="toggleCustomBankInput()" style="display: block; width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #9b59b6; font-size: 14px; font-weight: bold;">
                    <option value="Kpay">📱 KBZ Pay (Kpay)</option>
                    <option value="Wavepay">📱 Wave Pay</option>
                    <option value="AYAPay">📱 AYA Pay</option>
                    <option value="CBPay">📱 CB Pay</option>
                    <option value="KBZ Bank">🏦 KBZ Bank Account</option>
                    <option value="CB Bank">🏦 CB Bank Account</option>
                    <option value="AYA Bank">🏦 AYA Bank Account</option>
                    <option value="Other">✏️ အခြားဘဏ် (စိတ်ကြိုက်ရိုက်ရန်)</option>
                </select>

                <input type="text" id="custom-bank-name" placeholder="ဘဏ်နာမည် ရိုက်ထည့်ပါ (ဥပမာ - Yoma)" style="display: none; margin-bottom: 10px; border-color: #9b59b6;">
                <input type="text" id="amount" placeholder="ပမာဏ (ဥပမာ - ၁၅၀၀၀ သို့မဟုတ် 15000)">
                <input type="text" id="description" placeholder="အကြောင်းအရာ/မှတ်ချက် (ဥပမာ- လစာ၊ စားစရိတ်)">
                <div class="btn-group">
                    <button onclick="addTransaction('ဝင်ငွေ')" class="btn-inc">➕ ဝင်ငွေထည့်</button>
                    <button onclick="addTransaction('ထွက်ငွေ')" class="btn-exp">➖ ထွက်ငွေထည့်</button>
                </div>
            </div>

            <div style="margin-top: 20px; background: #eceff1; padding: 12px; border-radius: 8px; border-left: 5px solid #34495e;">
                <h4 style="margin: 0 0 10px 0; color: #2c3e50;">🔍 အဆင့်မြင့် စာရင်းပြန်ရှာရန်</h4>
                <label style="font-weight: bold; font-size: 13px; color: #34495e; display:block; margin-bottom: 4px;">📅 ရက်စွဲဖြင့် ရှာရန်:</label>
                <input type="date" id="filter-date" onchange="render()" style="width:100%; padding: 8px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ccc;">
                
                <label style="font-weight: bold; font-size: 13px; color: #34495e; display:block; margin-bottom: 4px;">🏦 ဘဏ်အမျိုးအစားဖြင့် ခွဲကြည့်ရန်:</label>
                <select id="filter-bank" onchange="render()" style="width:100%; padding: 8px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ccc; font-weight: bold;">
                    <option value="All">အားလုံးပြရန် (All)</option>
                    <option value="Cash">💵 Cash (ငွေသားကြည့်မည်)</option>
                    <option value="Kpay">📱 Kpay ကြည့်မည်</option>
                    <option value="Wavepay">📱 Wave Pay ကြည့်မည်</option>
                    <option value="AYAPay">📱 AYA Pay ကြည့်မည်</option>
                    <option value="CBPay">📱 CB Pay ကြည့်မည်</option>
                    <option value="KBZ Bank">🏦 KBZ Bank ကြည့်မည်</option>
                    <option value="CB Bank">🏦 CB Bank ကြည့်မည်</option>
                    <option value="AYA Bank">🏦 AYA Bank ကြည့်မည်</option>
                    <option value="Other">⚠️ အခြားဘဏ်စာရင်းများ ကြည့်မည်</option>
                </select>

                <label style="font-weight: bold; font-size: 13px; color: #34495e; display:block; margin-bottom: 4px;">✍️ အကြောင်းအရာ/မှတ်ချက်ဖြင့် ရှာရန်:</label>
                <input type="text" id="filter-text" oninput="render()" placeholder="ဥပမာ - လစာ ၊ စားစရိတ်" style="width:100%; padding: 8px; margin-bottom: 5px; border-radius: 4px; border: 1px solid #ccc;">
                <div id="filter-balance-div" style="display:none; margin-top: 10px; padding: 8px; background: #fff; border-radius: 4px; border: 1px solid #bdc3c7; font-weight: bold; color: #2c3e50; font-size: 13px;"></div>
                <button onclick="clearFilter()" style="background-color: #e74c3c; padding: 6px 12px; font-size: 12px; margin-top: 8px; width: auto; float: right; color: white; border: none; border-radius: 4px; cursor: pointer;">🔍 ရှာဖွေမှုအားလုံး ဖျက်မည်</button>
                <div style="clear: both;"></div>
            </div>

            <h3>📜 မှတ်တမ်းများ</h3>
            <ul id="transaction-list"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
